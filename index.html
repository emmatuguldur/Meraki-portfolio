<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Meraki — touch the heart, explore the galaxy</title>
<meta name="description" content="Meraki is a creative agency. Touch the sapphire heart of the nebula to warp into our galaxy — every star is a piece of our soul we left in a project.">
<style>
/* ============================================================
   MERAKI VOYAGE — design tokens (one grade across both acts)
   ============================================================ */
:root{
  --space:#0A0F22;         /* deep navy, not pure black */
  --space-deep:#04060E;    /* the nebula void */
  --gold:#E9B44C;          /* the soul / heat of meraki */
  --gold-bright:#FFD98A;
  --gold-hot:#FFF3DC;      /* warp flash */
  --cobalt:#3D63D8;
  --cobalt-light:#7C98F0;
  --sapphire:#2E64FF;      /* the heart */
  --ink:#EAEDF7;
  --muted:#97A0BF;
  --panel:#10162E;
  --panel-edge:#27325A;
  --hairline:#1B2344;
  --display:"Didot","Bodoni MT","Bodoni 72","Cochin","Playfair Display",Georgia,"Times New Roman",serif;
  --sans:"Avenir Next","Avenir","Segoe UI","Helvetica Neue",Helvetica,Arial,system-ui,sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  background:var(--space-deep);
  color:var(--ink);
  font-family:var(--sans);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ---------- scene canvases ---------- */
#galaxy{
  position:fixed;inset:0;width:100%;height:100%;
  display:block;cursor:grab;touch-action:none;z-index:1;
}
#galaxy.dragging{cursor:grabbing}
#galaxy.pointing{cursor:pointer}
#nebula{
  position:fixed;inset:0;width:100%;height:100%;
  display:block;cursor:crosshair;touch-action:none;z-index:2;
}
#nebula.pointing{cursor:pointer}
.off{display:none !important}

/* cinematic vignette — the color-grade frame over both acts */
#frame{position:fixed;inset:0;z-index:4;pointer-events:none;
  box-shadow:inset 0 0 220px 60px rgba(2,4,10,.9);}

/* warp flash */
#flash{
  position:fixed;inset:0;z-index:30;pointer-events:none;opacity:0;
  background:radial-gradient(circle at 50% 50%,
    var(--gold-hot) 0%, #FFE4A8 34%, rgba(233,180,76,.92) 58%, rgba(10,15,34,.98) 100%);
}

/* ---------- corner wordmark ---------- */
.wordmark{
  position:fixed;top:22px;left:26px;z-index:5;
  pointer-events:none;user-select:none;
}
.wordmark h1{
  font-family:var(--display);
  font-weight:400;font-size:1.45rem;letter-spacing:.34em;
  color:var(--ink);text-transform:uppercase;
}
.wordmark h1 span{color:var(--gold)}
.wordmark p{
  margin-top:4px;font-size:.62rem;letter-spacing:.28em;
  text-transform:uppercase;color:var(--muted);
}

/* ---------- nebula hint (Act I) ---------- */
.heart-hint{
  position:fixed;left:50%;bottom:9vh;transform:translateX(-50%);
  z-index:6;pointer-events:none;text-align:center;user-select:none;
  transition:opacity .8s ease;
}
.heart-hint .line{
  font-family:var(--display);font-size:1.05rem;letter-spacing:.3em;
  text-transform:uppercase;color:var(--gold-bright);
  animation:heartpulse 3s ease-in-out infinite;
}
.heart-hint .sub{
  margin-top:8px;font-size:.62rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);
}
.heart-hint.hidden{opacity:0}
@keyframes heartpulse{0%,100%{opacity:.45}50%{opacity:1}}

/* ---------- HUD (Act II) ---------- */
.hud{position:fixed;z-index:6}
.hud-controls{
  right:18px;bottom:18px;display:flex;flex-direction:column;gap:8px;
}
.hud-controls button{
  width:48px;height:48px;border-radius:50%;
  background:var(--panel);border:1px solid var(--panel-edge);
  color:var(--ink);font-size:1.05rem;line-height:1;cursor:pointer;
  transition:border-color .2s,color .2s;
  font-family:var(--sans);
}
.hud-controls button:hover{border-color:var(--gold);color:var(--gold)}
.hud-controls button:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.hud-controls button.heart{color:var(--cobalt-light)}
.hud-controls button.heart:hover{border-color:var(--sapphire);color:var(--sapphire)}
.hud-controls button.mode{
  font-size:.68rem;font-weight:600;letter-spacing:.12em;color:var(--gold);
}
.hud-controls button.mode:hover{border-color:var(--gold-bright);color:var(--gold-bright)}

/* onboarding hint */
.hint{
  left:50%;bottom:34px;transform:translateX(-50%);
  background:var(--panel);border:1px solid var(--panel-edge);
  border-radius:999px;padding:10px 22px;
  font-size:.78rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);
  display:flex;align-items:center;gap:10px;
  opacity:1;transition:opacity .9s ease;
  pointer-events:none;white-space:nowrap;
}
.hint .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);
  animation:pulse 2.2s ease-in-out infinite}
.hint.hidden{opacity:0}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* hover tooltip */
.tip{
  position:fixed;z-index:7;pointer-events:none;
  background:var(--panel);border:1px solid var(--panel-edge);
  padding:7px 14px;border-radius:6px;
  font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);
  transform:translate(14px,14px);
  opacity:0;transition:opacity .15s;
  white-space:nowrap;
}
.tip b{color:var(--gold);font-weight:600}
.tip.show{opacity:1}

/* ---------- accessible navigation ---------- */
.a11y-nav{
  position:fixed;top:0;left:0;z-index:20;
  display:flex;flex-direction:column;gap:2px;padding:6px;
}
.a11y-nav button{
  position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0);
  white-space:nowrap;border:0;padding:0;
}
.a11y-nav button:focus-visible{
  position:static;width:auto;height:auto;clip:auto;overflow:visible;
  background:var(--panel);color:var(--ink);border:1px solid var(--gold);
  padding:8px 14px;border-radius:6px;font-size:.8rem;cursor:pointer;
  outline:none;font-family:var(--sans);
}

/* ---------- overlay panel ---------- */
.veil{
  position:fixed;inset:0;z-index:10;
  background:rgba(7,11,25,.55);
  opacity:0;pointer-events:none;transition:opacity .35s;
  backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);
}
.veil.open{opacity:1;pointer-events:auto}

/* ---------- landing horizon: the planet you touch down on ---------- */
#ground{
  position:fixed;left:0;right:0;bottom:0;height:46vh;z-index:10;
  pointer-events:none;overflow:hidden;
  transform:translateY(105%);
  transition:transform .8s cubic-bezier(.22,1,.36,1);
  /* feather the top edge so the layer dissolves into space instead of ending on a line.
     Fully opaque by 26%, above where the horizon arc begins (30%), so the limb stays crisp. */
  -webkit-mask-image:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.55) 13%,#000 26%);
          mask-image:linear-gradient(180deg,transparent 0%,rgba(0,0,0,.55) 13%,#000 26%);
}
#ground.up{transform:translateY(0)}
#groundCv{display:block;width:100%;height:100%}

.panel{
  position:fixed;z-index:11;top:50%;left:50%;
  width:min(660px,calc(100vw - 36px));
  max-height:min(82vh,780px);
  transform:translate(-50%,-42%) scale(.98);
  background:linear-gradient(145deg,rgba(20,28,57,.98),rgba(11,16,36,.98));border:1px solid var(--panel-edge);
  border-radius:18px;
  opacity:0;pointer-events:none;
  transition:opacity .5s cubic-bezier(.22,1,.36,1),transform .5s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;
  box-shadow:0 30px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.035);
  isolation:isolate;
}
.panel.panel-wide{width:min(900px,calc(100vw - 36px))}
.panel[hidden]{display:none}
.panel.open{opacity:1;pointer-events:auto;transform:translate(-50%,-56%) scale(1)}
.panel-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:30px 32px 0;
}
.panel-eyebrow{
  font-size:.64rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);
  margin-bottom:10px;
}
.panel-title{
  font-family:var(--display);font-weight:400;font-size:2rem;line-height:1.1;
  letter-spacing:.02em;color:var(--ink);
}
.panel-close{
  flex:none;width:48px;height:48px;border-radius:50%;
  background:transparent;border:1px solid var(--panel-edge);
  color:var(--muted);font-size:1rem;cursor:pointer;margin-left:16px;
  transition:border-color .2s,color .2s;font-family:var(--sans);
}
.panel-close:hover{border-color:var(--gold);color:var(--gold)}
.panel-close:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
.panel-body{
  padding:22px 32px 34px;overflow-y:auto;
  font-size:.95rem;line-height:1.75;color:var(--muted);
  scrollbar-color:var(--panel-edge) transparent;
}
.panel-body p+p{margin-top:14px}
.panel-body em{color:var(--ink);font-style:normal}
.panel-body .lede{
  font-family:var(--display);font-size:1.18rem;line-height:1.5;color:var(--ink);
  margin-bottom:16px;
}

/* lists inside panels */
.item-list{list-style:none}
.item-list li{position:relative;padding:18px 0}
.item-list li::before{top:0}
.item-list li:first-child{padding-top:4px}
.item-list li:first-child::before{display:none}
.item-name{
  font-family:var(--display);font-size:1.22rem;line-height:1.2;color:var(--ink);margin-bottom:4px;
}
.item-meta{
  font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);
  margin-bottom:6px;
}
.item-desc{font-size:.88rem;line-height:1.7}

/* ---------- studio narratives: editorial clarity inside the galaxy ---------- */
.studio-page,.case-study{padding-bottom:4px}
.studio-intro{padding:2px 0 28px;position:relative;border-bottom:0}
.studio-intro::after,.studio-section::after,.case-footer::before,
.service-copy div::before,.item-list li::before{
  content:"";position:absolute;left:0;right:0;height:1px;pointer-events:none;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(124,152,240,.055) 8%,
    rgba(151,160,191,.20) 38%,
    rgba(151,160,191,.20) 62%,
    rgba(124,152,240,.055) 92%,
    transparent 100%);
}
.studio-intro::after{bottom:0}
.studio-intro .lede{max-width:760px;font-size:1.34rem;line-height:1.5}
.studio-intro p:last-child{max-width:660px}
.studio-section{padding:28px 0;position:relative;border-bottom:0}
.studio-section::after{bottom:0}
.studio-section:last-child{padding-bottom:0}
.studio-section:last-child::after{display:none}
.section-label,.case-label{
  color:var(--gold);font-size:.62rem;font-weight:600;letter-spacing:.26em;
  line-height:1.35;text-transform:uppercase;margin-bottom:9px;
}
.section-title{
  color:var(--ink);font-family:var(--display);font-size:1.55rem;font-weight:400;
  letter-spacing:.01em;line-height:1.15;margin-bottom:10px;
}
.studio-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:22px 34px}
.studio-grid p{margin:0}
.studio-grid strong{color:var(--ink);font-weight:600}
.principles{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-top:16px}
.principle{
  min-height:156px;padding:18px 17px;border:1px solid var(--hairline);border-radius:12px;
  background:linear-gradient(150deg,rgba(61,99,216,.09),transparent 70%);
  transition:border-color .25s,transform .25s,background .25s;
}
.principle:hover{border-color:rgba(233,180,76,.58);transform:translateY(-3px);background:linear-gradient(150deg,rgba(233,180,76,.12),transparent 70%)}
.principle-index{color:var(--gold);font-family:var(--display);font-size:1.15rem;line-height:1;margin-bottom:18px}
.principle h4,.team-role{color:var(--ink);font-size:.76rem;font-weight:600;letter-spacing:.13em;line-height:1.3;text-transform:uppercase;margin-bottom:8px}
.principle p{font-size:.84rem;line-height:1.6;margin:0}
.workflow{position:relative;display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px;margin-top:26px;padding-top:0}
.workflow::before{
  position:absolute;content:"";top:19px;left:0;right:0;height:1px;
  background:rgba(151,160,191,.22);
}
.workflow-step{position:relative;z-index:1;min-width:0}
.workflow-orb{
  width:auto;height:auto;display:block;border:0;border-radius:0;background:none;box-shadow:none;
  color:var(--muted);font-family:var(--sans);font-size:.56rem;letter-spacing:.26em;
  line-height:1;padding:0;margin:0 0 30px;position:relative;
}
.workflow-orb::after{
  content:"";position:absolute;left:0;top:15px;width:7px;height:7px;border-radius:50%;
  background:var(--space-deep);border:1px solid rgba(151,160,191,.55);
}
.workflow-step:last-child .workflow-orb::after{background:var(--gold);border-color:var(--gold)}
.workflow-step:nth-child(even) .workflow-orb{color:var(--muted)}
.workflow-step h4{color:var(--ink);font-family:var(--sans);font-size:.82rem;font-weight:600;letter-spacing:.01em;line-height:1.4;margin-bottom:7px}
.workflow-step p{font-size:.7rem;line-height:1.62;color:var(--muted);opacity:.86;margin:0}
@media (max-width:760px){
  .workflow{grid-template-columns:repeat(2,minmax(0,1fr));gap:22px}
  .workflow::before{display:none}
}
.studio-stats{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;margin-top:18px}
.studio-stat{padding:16px 12px;border:1px solid var(--hairline);border-radius:10px;background:rgba(4,6,14,.25)}
.studio-stat strong{display:block;color:var(--ink);font-family:var(--display);font-size:1.45rem;font-weight:400;line-height:1;margin-bottom:6px}
.studio-stat span{display:block;color:var(--muted);font-size:.62rem;letter-spacing:.12em;line-height:1.35;text-transform:uppercase}
.team-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px;margin-top:18px}
.team-card{min-height:174px;padding:17px 14px;border:1px solid var(--hairline);border-radius:12px;background:linear-gradient(155deg,rgba(124,152,240,.08),transparent 74%)}
.team-card p{font-size:.82rem;line-height:1.62;margin:0}
.team-card .team-line{color:var(--ink);font-family:var(--sans);font-size:.82rem;font-weight:600;line-height:1.6;margin-top:13px}
.studio-cta{padding:30px 0 4px;text-align:center}
.studio-cta .section-title{font-size:1.8rem;margin:0 auto 12px;max-width:620px}
.studio-cta p{max-width:560px;margin:0 auto 18px}
.text-link{
  display:inline-flex;align-items:center;gap:8px;padding:0;border:0;border-bottom:1px solid var(--gold);
  background:transparent;color:var(--gold);cursor:pointer;font-family:var(--sans);font-size:.72rem;
  letter-spacing:.2em;text-transform:uppercase;transition:color .2s,border-color .2s;
}
.text-link:hover{color:var(--gold-bright);border-color:var(--gold-bright)}
.text-link:focus-visible{outline:2px solid var(--gold);outline-offset:5px}
.reveal{animation:panel-rise .72s both;animation-delay:var(--delay,0s)}

/* ---------- Developers / Marketing panels ---------- */
.team-grid.roster{grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.member-name{color:var(--ink);font-family:var(--display);font-size:1.22rem;line-height:1.2;margin:0 0 8px}
.member-alias{color:var(--muted);font-family:var(--sans);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase}
.featured-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-top:18px}
.featured-card{padding:20px 18px;border:1px solid var(--hairline);border-radius:12px;
  background:linear-gradient(155deg,rgba(233,180,76,.10),transparent 74%);
  transition:border-color .25s,transform .25s}
.featured-card:hover{border-color:var(--panel-edge);transform:translateY(-2px)}
.featured-card p{font-size:.82rem;line-height:1.62;margin:0}
.featured-name{color:var(--ink);font-family:var(--display);font-size:1.24rem;line-height:1.2;margin:2px 0 9px !important}
.featured-card .text-link{margin-top:14px}
.rating-block{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:16px 0 12px}
.star-rating{color:var(--gold);font-size:1.6rem;letter-spacing:.22em;line-height:1;
  text-shadow:0 0 20px rgba(233,180,76,.45)}
.rating-count{color:var(--muted);font-size:.64rem;letter-spacing:.24em;text-transform:uppercase;margin:0}
.advisor-card{margin-top:18px;padding:22px 20px;border:1px solid var(--hairline);border-radius:12px;
  background:linear-gradient(155deg,rgba(110,140,255,.12),transparent 76%)}
.advisor-card p{font-size:.85rem;line-height:1.6;margin:0}
.advisor-role{color:var(--gold);font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;margin:0 0 10px !important}
.advisor-card .team-line{color:var(--ink);font-family:var(--sans);font-size:.85rem;font-weight:600;line-height:1.6;margin-top:13px}
.team-more{margin-top:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;
  font-size:.8rem;color:var(--muted)}
@media (max-width:760px){
  .team-grid.roster,.featured-grid{grid-template-columns:1fr}
}

/* ---------- service cards ---------- */
.service-list{list-style:none;display:grid;gap:10px}
.service-card{padding:22px;border:1px solid var(--hairline);border-radius:14px;background:rgba(4,6,14,.15);transition:border-color .25s,transform .25s,background .25s}
.service-card:hover{border-color:rgba(124,152,240,.72);transform:translateY(-2px);background:rgba(61,99,216,.08)}
.service-card .item-name{font-size:1.42rem}
.service-copy{display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;margin-top:17px}
.service-copy div{position:relative;padding-top:11px;border-top:0}
.service-copy div::before{top:0}
.service-copy b,.case-detail dt{display:block;color:var(--gold);font-size:.59rem;font-weight:600;letter-spacing:.2em;line-height:1.3;text-transform:uppercase;margin-bottom:5px}
.service-copy p{font-size:.83rem;line-height:1.6;margin:0}

/* ---------- agency case studies ---------- */
.case-stage{margin:2px 0 24px}
.case-summary{max-width:700px;color:var(--ink);font-family:var(--sans);font-size:1.02rem;line-height:1.7;margin-bottom:20px}
.case-meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:0 0 22px}
.case-detail{padding:14px 15px;border:1px solid var(--hairline);border-radius:10px;background:rgba(4,6,14,.22)}
.case-detail dd{color:var(--ink);font-size:.85rem;line-height:1.6;margin:0}
.case-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.case-block{padding:18px;border:1px solid var(--hairline);border-radius:12px;background:linear-gradient(155deg,rgba(61,99,216,.065),transparent 75%)}
.case-block p{font-size:.86rem;line-height:1.65;margin:0}
.case-block.wide{grid-column:1/-1}
.case-outcome{border-color:rgba(233,180,76,.33);background:linear-gradient(145deg,rgba(233,180,76,.09),transparent 70%)}
.case-footer{position:relative;display:flex;align-items:center;justify-content:space-between;gap:18px;padding-top:20px;margin-top:22px;border-top:0}
.case-footer::before{top:0}
.case-footer .case-label{margin:0}
.case-unpublished{color:var(--muted);font-size:.75rem;letter-spacing:.08em;text-transform:uppercase}
@keyframes signal-flow{to{background-position:-180% 0}}
@keyframes panel-rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.star-list button{
  width:100%;text-align:left;background:none;border:none;color:inherit;
  font-family:inherit;cursor:pointer;padding:0;
}
.star-list button:hover .item-name{color:var(--gold)}
.star-list button:focus-visible{outline:2px solid var(--gold);outline-offset:4px;border-radius:4px}
.star-list .item-name::before{
  content:"✦";color:var(--gold);font-size:.8em;margin-right:10px;
}

/* project card extras */
.proj-link{
  display:inline-block;margin-top:18px;
  color:var(--gold);text-decoration:none;
  font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;
  border-bottom:1px solid var(--gold);padding-bottom:3px;
  transition:color .2s,border-color .2s;
}
.proj-link:hover{color:var(--gold-bright);border-color:var(--gold-bright)}
.proj-link:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.proj-role{margin-top:14px}
.proj-role b{
  display:block;font-weight:600;color:var(--ink);
  font-size:.66rem;letter-spacing:.26em;text-transform:uppercase;margin-bottom:4px;
}

/* contact */
.contact-mail{
  display:inline-block;font-family:var(--display);font-size:1.5rem;
  color:var(--ink);text-decoration:none;margin:6px 0 18px;
  border-bottom:1px solid var(--gold);padding-bottom:4px;
  transition:color .2s;
}
.contact-mail:hover{color:var(--gold)}
.contact-mail:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.socials{display:flex;gap:20px;flex-wrap:wrap;margin-top:6px}
.socials a{
  color:var(--muted);text-decoration:none;
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;
  transition:color .2s;
}
.socials a:hover{color:var(--gold)}
.socials a:focus-visible{outline:2px solid var(--gold);outline-offset:3px}

/* sound toggle — present in both acts */

  color:var(--gold);font-size:1rem;cursor:pointer;
  transition:border-color .2s,color .2s,opacity .2s;

}
#audioBtn:hover{border-color:var(--gold-bright);color:var(--gold-bright)}
#audioBtn:focus-visible{outline:2px solid var(--gold);outline-offset:2px}
#audioBtn.muted{opacity:.45;text-decoration:line-through}

/* ---------- floating panel media (parallax layer) ---------- */
.media-stage{position:relative;height:150px;margin:2px 0 20px}
.media-float{position:absolute;will-change:transform;pointer-events:none}
.media-float.render{
  right:6px;top:8px;width:210px;height:126px;border-radius:12px;
  background:
    radial-gradient(120% 90% at 20% 15%, var(--c1), transparent 60%),
    radial-gradient(130% 110% at 85% 90%, var(--c2), transparent 65%),
    linear-gradient(160deg,#141B38,#0B1128);
  -webkit-mask-image:radial-gradient(140% 120% at 50% 45%, #000 55%, transparent 100%);
  mask-image:radial-gradient(140% 120% at 50% 45%, #000 55%, transparent 100%);
}
.media-float.glyph{
  left:0;top:-14px;
  font-family:var(--display);font-size:8.4rem;line-height:1;
  color:transparent;-webkit-text-stroke:1px rgba(233,180,76,.5);
}
@supports not (-webkit-text-stroke:1px black){
  .media-float.glyph{color:rgba(233,180,76,.16)}
}

/* ---------- delivery map: one quiet horizontal progression ---------- */
.dmap{margin:30px 0 6px}
.dmap-title{
  color:var(--muted);font-size:.58rem;letter-spacing:.28em;text-transform:uppercase;
  margin:0 0 14px;
}
.dmap svg{display:block;width:100%;height:auto;overflow:visible}
.dmap-rail{stroke:rgba(151,160,191,.22);stroke-width:1}
.dmap-node{fill:var(--space-deep);stroke:rgba(151,160,191,.55);stroke-width:1}
.dmap-node.is-end{fill:var(--gold);stroke:var(--gold)}
.dmap-step{
  fill:var(--muted);font-family:var(--sans);font-size:6.4px;font-weight:400;
  letter-spacing:.09em;text-transform:uppercase;text-anchor:middle;opacity:.82;
}
.dmap-step.is-end{fill:var(--ink);opacity:1}
.dmap-caption{
  color:var(--muted);font-size:.56rem;letter-spacing:.16em;text-transform:uppercase;
  margin:18px 0 0;opacity:.62;
}
@media (max-width:600px){
  .dmap-step{font-size:5.9px;letter-spacing:.04em}
}

.reserve{margin-top:18px;display:flex;flex-direction:column;gap:14px}
.reserve label{
  display:block;font-size:.62rem;letter-spacing:.26em;text-transform:uppercase;
  color:var(--gold);
}
.reserve input,.reserve textarea{
  display:block;width:100%;margin-top:7px;
  background:var(--space);border:1px solid var(--panel-edge);border-radius:8px;
  color:var(--ink);font-family:var(--sans);font-size:.95rem;
  padding:11px 13px;transition:border-color .2s;
  color-scheme:dark;
}
.reserve input:focus-visible,.reserve textarea:focus-visible{
  outline:none;border-color:var(--gold);
}
.reserve [aria-invalid="true"]{border-color:#C4514F}
.reserve textarea{resize:vertical;min-height:74px}
.form-status{font-size:.85rem;line-height:1.6;min-height:1.4em;margin:0}
.form-status[data-tone="info"]{color:var(--muted)}
.form-status[data-tone="err"]{color:#E08886}
.form-status[data-tone="ok"]{color:var(--gold-bright)}
.reserve .launch{

  background:transparent;border:1px solid var(--gold);border-radius:999px;
  color:var(--gold);font-family:var(--sans);
  font-size:.74rem;letter-spacing:.22em;text-transform:uppercase;

}
.reserve .launch:hover{background:var(--gold);color:#1A1206}
.reserve .launch:focus-visible{outline:2px solid var(--gold);outline-offset:3px}
.reserve .launch[disabled]{opacity:.55;cursor:wait}

/* mobile */

body.modal-open{overflow:hidden;overscroll-behavior:none;touch-action:none}
.panel-body{overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
/* inline text controls keep their fine visual weight but gain a 48px hit area */
.text-link,.socials a,.contact-mail,.proj-link{position:relative}
.text-link::after,.socials a::after,.contact-mail::after,.proj-link::after{

@media (prefers-reduced-motion:reduce){

  .hint .dot,.heart-hint .line,.reveal,.workflow::before,.media-float{animation:none}

  .veil{backdrop-filter:none;-webkit-backdrop-filter:none;background:rgba(7,11,25,.82)}
  .panel{transform:translate(-50%,-50%) scale(1)}

  .featured-card:hover,.principle:hover{transform:none}
}

/* pre-rendered soft glow sprites — the 60fps volumetric trick */
function sprite(stops, size){
  const c = document.createElement("canvas"); c.width = c.height = size;
  const g = c.getContext("2d");
  const grd = g.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
  for (const [o, col] of stops) grd.addColorStop(o, col);
  g.fillStyle = grd; g.fillRect(0, 0, size, size);
  return c;
}

}

}

/* ---------- lifecycle registry: every listener is revocable ---------- */
const Reg = {
  subs: [],
  on(target, ev, fn, opts){
    target.addEventListener(ev, fn, opts);
    this.subs.push([target, ev, fn, opts]);

  clear(){
    for (const [t, e, f, o] of this.subs) t.removeEventListener(e, f, o);
    this.subs.length = 0;

};

/* ---------- ambient audio: a place, not a soundtrack ---------- */
const AudioSys = (() => {
  let ac = null, master = null, padGain = null, padNodes = [], sweep = null, sweepGain = null;
  let muted = false, padLive = false;

  let hbGain = null, hbNodes = [], hbSched = null, hbNext = 0, hbLive = false;
  let hbBpm = 52, hbBpmTarget = 52, hbTense = 0, hbTenseTarget = 0;
  let droneG = null, shimG = null;
  function thump(t, vel){
    const o = ac.createOscillator(); o.type = "sine";
    o.frequency.setValueAtTime(64, t);
    o.frequency.exponentialRampToValueAtTime(27, t + 0.13);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vel, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);

      const g = ac.createGain(); g.gain.value = 0.5;

    shimG = ac.createGain(); shimG.gain.value = 0.012; shimG.connect(hbGain);
    const trem = ac.createOscillator(); trem.frequency.value = 6.2;
    const tremG = ac.createGain(); tremG.gain.value = 0.006;
    trem.connect(tremG); tremG.connect(shimG.gain); trem.start();
    for (const [f, v] of [[440, 1], [466.16, 1], [880, 0.4], [932.33, 0.4]]){
      const o = ac.createOscillator(); o.type = "sine"; o.frequency.value = f;
      const g = ac.createGain(); g.gain.value = v;
      o.connect(g); g.connect(shimG); o.start();
      hbNodes.push(o, g);
    }
    /* breath: slow noise swells, like trying to stay calm */
    const br = ac.createBufferSource();
    const bb = ac.createBuffer(1, ac.sampleRate * 2, ac.sampleRate);
    const bd = bb.getChannelData(0);
    for (let i = 0; i < bd.length; i++) bd[i] = Math.random() * 2 - 1;
    br.buffer = bb; br.loop = true;
    const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 850; bp.Q.value = 0.6;
    const bg = ac.createGain(); bg.gain.value = 0.012;
    const blfo = ac.createOscillator(); blfo.frequency.value = 0.09;
    const blg = ac.createGain(); blg.gain.value = 0.01;
    blfo.connect(blg); blg.connect(bg.gain); blfo.start();
    br.connect(bp); bp.connect(bg); bg.connect(hbGain); br.start();
    hbNodes.push(trem, tremG, br, bp, bg, blfo, blg, droneG, shimG);
    /* the racing pulse: lub-dub pairs, tempo eased toward the visual heartbeat */
    hbNext = ac.currentTime + 0.1;
    hbSched = setInterval(() => {
      if (!hbLive) return;
      hbBpm += (hbBpmTarget - hbBpm) * 0.08;
      hbTense += (hbTenseTarget - hbTense) * 0.06;
      if (droneG) droneG.gain.setTargetAtTime(0.05 + hbTense * 0.05, ac.currentTime, 0.2);
      if (shimG)  shimG.gain.setTargetAtTime(0.012 + hbTense * 0.014, ac.currentTime, 0.2);
      while (hbNext < ac.currentTime + 0.25){
        const period = 60 / hbBpm;
        thump(hbNext, 0.30 + hbTense * 0.10);                 /* lub */
        thump(hbNext + Math.min(0.30, period * 0.32), 0.18);  /* dub */

    const t = ac.currentTime;

    hbGain.gain.setValueAtTime(hbGain.gain.value, t);
    hbGain.gain.linearRampToValueAtTime(0, t + 0.45);

  /* nebula drives this each frame: visual beat rate + hover tension → sound */
  function setPulse(beatVal, tense){

  const midi = m => 440 * Math.pow(2, (m - 69) / 12);
  const TEMPO = 72, BEAT = 60 / TEMPO, SWING = 0.62;
  const PROG = [                                     /* [bassMidi, chordMidis, sparkleScale] */
    [41, [53, 57, 60, 64], [65, 69, 72, 76, 77]],    /* Fmaj7  */
    [40, [55, 59, 62, 64], [64, 67, 71, 74, 76]],    /* Em7    */
    [38, [57, 60, 62, 65], [62, 65, 69, 72, 74]],    /* Dm9    */
    [36, [55, 59, 60, 64], [60, 64, 67, 71, 72]]     /* Cmaj7  */

    const f = midi(m);

      o.type = type; o.frequency.value = f; o.detune.value = det;

      g.gain.exponentialRampToValueAtTime(vel * v, t + 0.03);
      g.gain.setTargetAtTime(vel * v * 0.35, t + 0.05, dur * 0.35);
      g.gain.setTargetAtTime(0.0001, t + dur, 0.09);
      o.connect(g); g.connect(bus);
      o.start(t); o.stop(t + dur + 0.6);
    }

  function bassNote(m, t, dur, vel){
    const o = ac.createOscillator(); o.type = "sine"; o.frequency.value = midi(m);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vel, t + 0.02);
    g.gain.setTargetAtTime(0.0001, t + dur * 0.8, 0.12);
    o.connect(g); g.connect(bus);
    o.start(t); o.stop(t + dur + 0.5);
  }
  function brush(t, vel){
    const dur = 0.09;
    const src = ac.createBufferSource();
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    src.buffer = buf;
    const bp = ac.createBiquadFilter(); bp.type = "bandpass"; bp.frequency.value = 6200; bp.Q.value = 0.8;
    const g = ac.createGain(); g.gain.value = vel;
    src.connect(bp); bp.connect(g); g.connect(bus);
    src.start(t);
  }
  function sparkle(m, t, vel){
    const o = ac.createOscillator(); o.type = "sine"; o.frequency.value = midi(m);
    wobbleG.connect(o.detune);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vel, t + 0.015);
    g.gain.setTargetAtTime(0.0001, t + 0.1, 0.22);
    o.connect(g); g.connect(bus); g.connect(echo);   /* dreamier through the tape echo */
    o.start(t); o.stop(t + 1.6);
  }
  function scheduleStep(s, t){                        /* 8 swung eighths/bar, 4 bars */
    const bar = Math.floor(s / 8) % 4, eighth = s % 8;
    const [bassM, chord, scale] = PROG[bar];
    if (eighth === 0){
      chord.forEach((m, i) => epNote(m, t + i * 0.012, BEAT * 2.6, 0.105)); /* lazy roll */
      bassNote(bassM, t, BEAT * 2.4, 0.21);
    }
    if (eighth === 5)                                 /* ghost re-strike on the and-of-3 */
      chord.forEach((m, i) => epNote(m, t + i * 0.01, BEAT * 1.2, 0.05));
    if (eighth === 4) bassNote(bassM + 7, t, BEAT * 1.1, 0.11);
    if (eighth === 2 || eighth === 6) brush(t, 0.05); /* backbeat */
    if (eighth === 7 && Math.random() < 0.5) brush(t, 0.026);
    if ((eighth === 3 || eighth === 6) && Math.random() < 0.30)
      sparkle(scale[(Math.random() * scale.length) | 0] + 12, t, 0.07);
    if (Math.random() < 0.10){                        /* vinyl pop */
      const p = ac.createBufferSource();
      const b = ac.createBuffer(1, 220, ac.sampleRate);
      const dd = b.getChannelData(0);
      for (let i = 0; i < dd.length; i++) dd[i] = (Math.random() * 2 - 1) * (1 - i / dd.length);
      p.buffer = b;
      const g = ac.createGain(); g.gain.value = 0.08;
      p.connect(g); g.connect(bus);

    }
  }
  function startPad(){
    if (!ensure() || padLive) return; padLive = true;
    padGain = ac.createGain(); padGain.gain.value = 0;
    const warm = ac.createBiquadFilter();             /* lo-fi warmth: nothing above ~2.4k */
    warm.type = "lowpass"; warm.frequency.value = 2400; warm.Q.value = 0.4;
    bus = ac.createGain(); bus.gain.value = 1;
    bus.connect(warm); warm.connect(padGain); padGain.connect(master);

    const wet = ac.createGain(); wet.gain.value = 0.5;
    echo.connect(fb); fb.connect(echo); echo.connect(wet); wet.connect(warm);
    const wob = ac.createOscillator(); wob.frequency.value = 0.6;   /* tape wobble */
    wobbleG = ac.createGain(); wobbleG.gain.value = 4.5;

    const hd = hb.getChannelData(0);

    const hbp = ac.createBiquadFilter(); hbp.type = "highpass"; hbp.frequency.value = 3800;
    const hg = ac.createGain(); hg.gain.value = 0.011;

    if (!ac || !padLive) return; padLive = false;
    clearInterval(sched); sched = null;
    const t = ac.currentTime;
    padGain.gain.cancelScheduledValues(t);
    padGain.gain.setValueAtTime(padGain.gain.value, t);
    padGain.gain.linearRampToValueAtTime(0, t + 0.7);
    const nodes = padNodes; padNodes = [];
    setTimeout(() => nodes.forEach(n => { try{ n.stop ? n.stop() : n.disconnect(); }catch(e){} }), 900);
  }
  /* warp: rising sweep engineered to peak exactly at the flash */
  function warpStart(){
    if (!ensure()) return;
    warpEnd(true);

    sweepGain = ac.createGain(); sweepGain.gain.value = 0.0001;

    if (!ac || !sweep) return;

    sweep.frequency.setTargetAtTime(70 + Math.pow(p, 2.2) * 1250, t, 0.03);
    sweepGain.gain.setTargetAtTime(0.05 + p * 0.06, t, 0.05);
  }
  function warpEnd(silent){
    if (!ac || !sweep) return;
    const t = ac.currentTime, s = sweep, g = sweepGain;
    sweep = null; sweepGain = null;
    g.gain.cancelScheduledValues(t);
    g.gain.setValueAtTime(Math.max(0.0001, g.gain.value), t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (silent ? 0.03 : 0.18));
    setTimeout(() => { try{ s.stop(); }catch(e){} }, 300);

    const p = ac.createStereoPanner ? ac.createStereoPanner() : ac.createGain();

    p.connect(master);

      const o = ac.createOscillator();
      o.type = "sine"; o.frequency.value = f * (1 + (Math.random()-0.5)*0.004);
